<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장소 검색 서비스</title>
    <style>
        /* CSS: 기본 레이아웃 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        
        .main-container { display: flex; height: 100vh; }

        /* 왼쪽 사이드바 (350px 고정) */
        .sidebar {
            width: 350px;
            height: 100%;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .search-area { padding: 20px; background: #fae100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-area input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-area button { width: 25%; padding: 10px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }

        #results-list { flex: 1; overflow-y: auto; padding: 10px; }
        .place-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .place-item:hover { background: #f0f0f0; }
        .place-item h4 { margin-bottom: 5px; color: #111; }
        .place-item p { font-size: 13px; color: #666; }

        /* 오른쪽 지도 영역 */
        .map-area { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; background: #eee; } /* 로드 전 배경색 */
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="search-area">
                <input type="text" id="keyword" placeholder="장소 입력 (예: 강남역)" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <div id="results-list"></div>
        </div>
        <div class="map-area">
            <div id="map"></div>
        </div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d922388e247214b190a5f4ae2533d218&libraries=services&autoload=false"></script>

    <script>
        let map;
        let placeSearch;
        let infoWindow;

        // 1. SDK 로드 완료 후 실행 (로딩 에러 방지)
        kakao.maps.load(function() {
            initMap();
        });

        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.5668, 126.9786), // 초기값 서울시청
                level: 5
            };

            map = new kakao.maps.Map(container, options); // 지도 생성
            placeSearch = new kakao.maps.services.Places(); // 장소 검색 서비스
            infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 }); // 클릭 시 뜰 팝업

            // 2. 현재 위치 권한 요청
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(lat, lng);
                    
                    map.setCenter(currentPos); // 현재 위치로 이동
                    
                    // 내 위치 마커 표시
                    new kakao.maps.Marker({
                        position: currentPos,
                        map: map
                    });
                }, function(err) {
                    console.log("위치 정보를 가져올 수 없습니다.");
